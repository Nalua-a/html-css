<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>videos com html 5</title>
</head>
<body>
    <h1>inserido videos</h1>
    <p> esse video está hospedado com meu proprio servidor</p>
    <video width="500" controls autoplay loop poster="midia/limoes-capa.png">
       <source src="midia/meu-video.mp4" type="video/mp4">
       <source src="midia/meu-video.m4v" type="video/m4v">
       <source src="midia/meu-video.webm" type="video/webm">
       <h1>inserindo videos do youtube</h1>
    </video>
    <h1>inserindo videos do youtube</h1>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/3hng-hmSv2Y?si=8tn2UYDStmalsiik" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</body>
</html>
