<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagens dinamicas</title>
</head>
<body>
    <H1>Imagens dinamicas</H1>
    <p>tente abrir esse site com essas imagens em dispositivos diferentes ou simplesmente aumente e diminua o seu navegador </p>
    <picture>
         <source media="(max-width: 750px)" srcset="imagens/foto-p.png" type="image/png">
         <source media="(max-width: 1050px)" srcset="Imagens/foto-m.png" type="image/png">
        <img src="Imagens/foto-g.png" alt="imagem flexivel">
    </picture>
    <h1>Reproduzir audio</h1>
    <p>Vamos aprender a colocar audio nos seus sites</p>
    <audio preload="metadata" controls loop> 
        <source src="media/happymistake.mp3" type="audio/mpeg">
        <source src="media/happymistake.ogg" type="audio/ogg">
        <source src="media/happymistake.dgg" type="audio/dgg">
        <p>infelismente o seu navegadr não consegue reproduzir esse tipo de arquivo <a href="media/happymistake.mp3">clique aqui para baixar o arquivo  MP3</a></p>
    </audio>
    <!--mp3 wav dgg-->

</body>
</html>
